<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fde8f0, #fceabb, #f9d4e8);
}

.container {
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 48px;
    color: #c0607a;
    margin-bottom: 8px;
    text-shadow: 1px 1px 3px rgba(192, 96, 122, 0.2);
}

p {
    font-size: 16px;
    color: #b07a8a;
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
}

button {
    padding: 13px 35px;
    border: none;
    border-radius: 30px;
    font-size: 15px;
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: 18px;
    color: white;
    background: linear-gradient(to right, #f78ca0, #f9748f, #fd868c);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(247, 140, 160, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(247, 140, 160, 0.5);
}
</style>
<body>
<h1>Breathe, Baraka 🤍</h1>
    <p>1. Take 5 deep breaths slowly</p>
    <p>2. Step away from your books for 10 minutes</p>
    <p>3. Drink some water & eat something small</p>
    <p>4. Write down only 3 tasks for today, ignore the rest</p>
    <p>5. Play one song that makes you feel safe</p>
</body>
</html>
