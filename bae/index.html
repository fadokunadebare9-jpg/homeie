<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Baraka my Greatest fan</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fde8f0, #fceabb, #f9d4e8);
}

.container {
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 48px;
    color: #c0607a;
    margin-bottom: 8px;
    text-shadow: 1px 1px 3px rgba(192, 96, 122, 0.2);
}

p {
    font-size: 16px;
    color: #b07a8a;
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
}

button {
    padding: 13px 35px;
    border: none;
    border-radius: 30px;
    font-size: 15px;
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: 18px;
    color: white;
    background: linear-gradient(to right, #f78ca0, #f9748f, #fd868c);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(247, 140, 160, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(247, 140, 160, 0.5);
}

#letter {
    visibility: hidden;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;

    margin-top: 30px;
    padding: 35px 30px;
    background: linear-gradient(160deg, #fff6f9, #fff0f5);
    border-radius: 20px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 8px 30px rgba(240, 150, 170, 0.25);
    border: 1px solid rgba(255, 182, 203, 0.4);

    font-family: 'Dancing Script', cursive;
    font-size: 20px;
    color: #a05070;
    line-height: 2;
    text-align: left;
}

#letter .signature {
    margin-top: 16px;
    font-size: 22px;
    font-weight: 700;
    color: #c0607a;
    text-align: right;
}

#letter.show {
    visibility: visible;
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>
<div class="container">
    <h1>For Baraka 🤍</h1>
    <p>You've been trying, I see you.</p>

    <button onclick="openLetter()">Open This 💌</button>
<a href="calm.html">Need to calm down? 🫶</a>
    <div id="letter">
        Baraka 🤍 <br><br>
        I know things have been really stressful lately…
        but I just want you to breathe small 🫶 <br><br>
        You don't have to figure everything out at once. <br><br>
        You're doing your best, and that's enough. <br><br>
        I dey your back always 🤍
        <div class="signature">— Adebare</div>
    </div>
</div>

<script>
function openLetter() {
    let letter = document.getElementById("letter");
    letter.style.visibility = "visible";
    setTimeout(() => {
        letter.classList.add("show");
    }, 10);
}
</script>
</body>
</html>
